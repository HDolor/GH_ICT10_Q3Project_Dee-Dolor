<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seatwork 2 Third Quarter</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .container {
            background: #ffffff;
            width: 380px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        h2 {
            text-align: center;
            margin: 0 0 10px 0;
            font-size: 20px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 14px;
            font-weight: bold;
        }

        select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            width: 100%;
            background: #fff;
        }

        button {
            margin-top: 10px;
            padding: 12px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid #ccc;
            background: #f2f2f2;
            color: #333;
        }

        button:hover {
            background: #e6e6e6;
        }

        #output {
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
            min-height: 40px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Seatwork 2 Third Quarter</h2>

    <div class="field">
        <label>Are you done with the online registration?</label>
        <select id="registration">
            <option value="" disabled selected>Select</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>
    </div>

    <div class="field">
        <label>Do you have the medical clearance from the clinic?</label>
        <select id="medical">
            <option value="" disabled selected>Select</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>
    </div>

    <div class="field">
        <label>What is your Grade?</label>
        <select id="grade">
            <option value="" disabled selected>Select Grade</option>
            <option value="7">Grade 7</option>
            <option value="8">Grade 8</option>
            <option value="9">Grade 9</option>
            <option value="10">Grade 10</option>
        </select>
    </div>

    <div class="field">
        <label>Section</label>
        <select id="section">
            <option value="" disabled selected>Select Section</option>
            <option value="Ruby">Ruby</option>
            <option value="Emerald">Emerald</option>
            <option value="Sapphire">Sapphire</option>
            <option value="Topaz">Topaz</option>
        </select>
    </div>

    <button id="checkBtn">Sign up</button>

    <div id="output"></div>
</div>

<script type="py" src="main.py"></script>

</body>
</html>
