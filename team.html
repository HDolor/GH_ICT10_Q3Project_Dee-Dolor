<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Checker</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <style>
        h2 {
            text-align: center;
            margin: 0 0 10px 0;
            font-size: 20px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 14px;
            font-weight: bold;
        }

        select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            width: 100%;
            background: #fff;
        }
        #output {
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
            min-height: 40px;
        }
    </style>
</head>
<body class="bg-dark">
    <!--Copy-->
    <nav class="navbar bg-success border border-light border-3 navbar-expand-sm">
        <div class="container-fluid">
            <div>
                <p class="fw-bold fs-3 text-light" id="IM">INTRAMURALS 2025-2026</p>
            </div>
            <div class="d-flex">
                <ul class="navbar-nav">
                    <li class="nav-item bg-light rounded-2 m-2">
                        <a href="index.html" class="nav-link active fw-bold">CREATE ACCOUNT</a>
                    </li>  
                    <li class="nav-item bg-light rounded-2 m-2">
                        <a href="team.html" class="nav-link active fw-bold">TEAM CHECKER</a>
                    </li>
                    <li class="nav-item bg-light rounded-2 m-2">
                        <a href="player.html" class="nav-link active fw-bold">PLAYER LIST</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <br><br>
    <div class="container col-4 border border-2 rounded-4 p-4 shadow-lg bg-light mb-5">
        <form class="text-center">
            <h2>Seatwork 2 Third Quarter</h2>
            <hr>
            <div class="field">
                <label>Are you done with the online registration?</label>
                <select id="registration" class="">
                    <option value="" disabled selected>Select</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>
            <br>
            <div class="field">
                <label>Do you have the medical clearance from the clinic?</label>
                <select id="medical">
                    <option value="" disabled selected>Select</option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>
            <br>
            <div class="field">
                <label>What is your Grade?</label>
                <select id="grade">
                    <option value="" disabled selected>Select Grade</option>
                    <option value="7">Grade 7</option>
                    <option value="8">Grade 8</option>
                    <option value="9">Grade 9</option>
                    <option value="10">Grade 10</option>
                </select>
            </div>
            <br>
            <div class="field">
                <label>Section</label>
                <select id="section">
                    <option value="" disabled selected>Select Section</option>
                    <option value="Ruby">Ruby</option>
                    <option value="Emerald">Emerald</option>
                    <option value="Sapphire">Sapphire</option>
                    <option value="Topaz">Topaz</option>
                </select>
            </div>
            <br>
            <button id="checkBtn" type="button" class="btn btn-success border-dark-subtle fw-bold text-center p-2" py-click="intrams_team">Sign up</button>
            <hr>
            <div id="output" class="fw-bold fs-4"></div>
        </form>
    </div><br><br><br>
    <!--Copy-->
    <div class="container-fluid fixed-bottom bg-success text-center mt-5">
        <p>AARON DEE X HARVEY DOLOR<br>@2026 Project</p>
    </div>

<script type="py" src="main.py"></script>

</body>
</html>
