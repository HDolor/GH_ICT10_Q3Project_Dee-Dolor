<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <style>
        .login-box {
            background: #ffffff;
            padding: 45px;
            border-radius: 15px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
            width: 410px;
            height: 520px;
            text-align: center;
        }

        h2 { color: #1e293b; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            background: #f8fafc;
        }

        button {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            background-color: #c00c0c;
            cursor: pointer;
            margin-top: 15px;
        }

        #feedback {
            margin-top: 25px;
            font-size: 14px;
            color: #475569;
            min-height: 40px;
        }
    </style>
</head>
<body class="bg-dark">
    <!--Copy-->
    <nav class="navbar bg-danger border border-light border-3 navbar-expand-md mb-5">
        <div class="container-fluid">
            <div>
                <p class="fw-bold fs-3 text-light" id="IM">INTRAMURALS 2025-2026</p>
            </div>
            <div class="d-flex">

                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <br><br><br>
    <div class="login-box container">
        <h2 class="fw-bold">Sign Up</h2>
        <input type="text" id="user_field" placeholder="Username" class="form-control fw-bold fs-5">
        <input type="password" id="pass_field" placeholder="Password" class="form-control fw-bold fs-5">            
        <button id="submit-btn" py-click="process_signup" class="fw-bold fs-4">Register</button>
        <br>
        <div id="feedback" class="fw-bold fs-4"></div>
    </div><br><br><br><br>
